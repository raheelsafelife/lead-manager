services:
  # Base Setup Service (Creates DB and Imports CSVs)
  setup:
    build: .
    volumes:
      - ./data:/app/data
    command: >
      sh -c "python3 backend/create_db.py && python3 backend/migrations/migrate_universal.py"
    environment:
      - ALLOW_ADMIN_RESET=true
      - BACKEND_API_URL=http://api:8000

  # Backend API (FastAPI)
  api:
    build: .
    env_file: .env
    depends_on:
      setup:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    working_dir: /app/backend
    command: uvicorn api_server:app --host 0.0.0.0 --port 8000
    restart: always

  # Frontend Dashboard (Streamlit)
  dashboard:
    build: .
    env_file: .env
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://api:8000
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
      - ./frontend_app:/app/frontend_app
    command: streamlit run frontend_app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    restart: always
