<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lead Manager</title>
    <link rel="icon" href="/favicon.svg" />
    <style>
      :root {
        --boot-deep: #00506b;
        --boot-aqua: #35a7c7;
        --boot-text: #172033;
        --boot-muted: #667085;
      }
      html, body, #root { min-height: 100%; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #f8fbfe 0%, #f3f8fb 100%);
      }
      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--boot-text);
      }
      .boot-card {
        width: min(420px, 100%);
        display: grid;
        justify-items: center;
        gap: 18px;
        text-align: center;
      }
      .boot-logo {
        width: 116px;
        height: 116px;
        display: grid;
        place-items: center;
        border-radius: 32px;
        background: #fff;
        box-shadow: 0 22px 56px rgba(0, 80, 107, 0.16);
        border: 1px solid rgba(53, 167, 199, 0.22);
      }
      .boot-logo img {
        width: 74px;
        height: 74px;
        object-fit: contain;
      }
      .boot-title {
        margin: 0;
        color: var(--boot-deep);
        font-size: 1.8rem;
        line-height: 1.1;
        font-weight: 900;
      }
      .boot-copy {
        margin: 0;
        color: var(--boot-muted);
        font-size: 0.95rem;
        font-weight: 700;
      }
      .boot-bar {
        width: min(320px, 100%);
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: #dcebf2;
      }
      .boot-bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--boot-deep), var(--boot-aqua));
        animation: boot-scan 1.15s ease-in-out infinite;
      }
      .boot-error {
        min-height: 100vh;
        padding: 32px;
        display: grid;
        align-content: center;
        color: #991b1b;
        background: #fff7f7;
      }
      .boot-error h1 {
        margin: 0 0 12px;
        font-size: 1.4rem;
      }
      .boot-error pre {
        margin: 0;
        max-width: 860px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      @keyframes boot-scan {
        0% { transform: translateX(-110%); }
        55% { transform: translateX(85%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen" aria-live="polite" aria-busy="true">
        <div class="boot-card">
          <div class="boot-logo">
            <img src="/sidebar_logo.png" alt="Lead Manager" />
          </div>
          <h1 class="boot-title">Lead Manager</h1>
          <p class="boot-copy">Starting your workspace...</p>
          <div class="boot-bar" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module">
      const root = document.getElementById("root");
      const showBootError = (error) => {
        const message = error && error.message ? error.message : String(error || "Unknown startup error");
        if (root) {
          root.innerHTML = `<div class="boot-error"><h1>Lead Manager failed to load</h1><pre>${message}</pre></div>`;
        }
      };
      window.addEventListener("error", (event) => showBootError(event.error || event.message));
      window.addEventListener("unhandledrejection", (event) => showBootError(event.reason));
      import("/src/main.jsx").catch(showBootError);
    </script>
  </body>
</html>
