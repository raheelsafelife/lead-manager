name: Deploy rebuilt Lead Manager

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend_app/**"
      - "rebuild frontend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/deploy-rebuilt-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-rebuilt-lead-manager
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_PORT: ${{ secrets.AWS_PORT }}
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$AWS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$AWS_PORT" -H "$AWS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy rebuilt frontend and API
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_PORT: ${{ secrets.AWS_PORT }}
          AWS_USER: ${{ secrets.AWS_USER }}
          LEAD_MANAGER_API_KEY: ${{ secrets.LEAD_MANAGER_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          ssh -p "$AWS_PORT" -i ~/.ssh/deploy_key "$AWS_USER@$AWS_HOST" \
            "cd '$APP_DIR' && \
             git fetch origin main && \
             git reset --hard origin/main && \
             cd 'rebuild frontend' && \
             npm ci && \
             rm -rf dist && \
             npm run build && \
             test -s dist/index.html && \
             LEAD_MANAGER_API_KEY='$LEAD_MANAGER_API_KEY' \
             JWT_SECRET_KEY='$JWT_SECRET_KEY' \
             pm2 restart lead-manager-react --update-env && \
             pm2 save"
