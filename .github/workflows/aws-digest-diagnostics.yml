name: aws-digest-diagnostics
# Temporary workflow for AWS digest checks.

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/aws-digest-diagnostics.yml"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_PORT: ${{ secrets.AWS_PORT }}
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$AWS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$AWS_PORT" -H "$AWS_HOST" >> ~/.ssh/known_hosts

      - name: Check digest status
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_PORT: ${{ secrets.AWS_PORT }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: |
          ssh -p "$AWS_PORT" -i ~/.ssh/deploy_key "$AWS_USER@$AWS_HOST" "cd '$APP_DIR' && bash -s" <<'REMOTE'
          set -euo pipefail
          echo "== commit =="
          git rev-parse --short HEAD
          echo "== pm2 =="
          pm2 list
          echo "== digest logs =="
          pm2 logs lead-manager-react --lines 250 --nostream 2>/dev/null | grep -Ei 'digest|smtp|mail|error|failed|scheduler' || true
          echo "== digest db summary =="
          cd 'rebuild frontend'
          node --input-type=module <<'NODE'
          import dotenv from "dotenv";
          import path from "path";
          import { fileURLToPath } from "url";
          import { execFileSync } from "child_process";
          import { createDatabase } from "./server/db.js";

          const __dirname = path.dirname(fileURLToPath(import.meta.url));
          const rootDir = path.resolve(__dirname, "..");
          dotenv.config({ path: path.join(rootDir, ".env") });
          dotenv.config({ path: path.resolve(__dirname, ".env") });

          const pm2List = JSON.parse(execFileSync("pm2", ["jlist"], { encoding: "utf8" }));
          const app = pm2List.find((item) => item.name === "lead-manager-react");
          Object.assign(process.env, app?.pm2_env?.env || {});

          const db = await createDatabase({
            dbPath: path.join(rootDir, "backend", "leads.db"),
            schemaPath: path.resolve(__dirname, "migrations", "aws", "postgres-schema.sql")
          });
          const rows = await db.all("select digest_date,status,count(*) as count,sum(activity_count) as activity_count from daily_digest_emails group by digest_date,status order by digest_date desc,status");
          const users = await db.get("select count(*) as count from users where is_approved = 1 and email is not null and email <> ''");
          const latest = await db.all("select digest_date,status,activity_count,error_message from daily_digest_emails order by sent_at desc limit 12");
          const activity = await db.all("select substr(timestamp,1,10) as utc_date,count(*) as count from activity_logs where action_type in ('CREATE_LEAD','UPDATE_LEAD','DELETE_LEAD','RESTORE_LEAD','PERMANENT_DELETE','ADD_COMMENT','UPLOAD_ATTACHMENT','DELETE_ATTACHMENT','CARE_START_MARKED','AUTHORIZATION_MARKED','LEAD_CREATED','LEAD_UPDATED','LEAD_ASSIGNED','LEAD_DELETED','LEAD_PERMANENTLY_DELETED','LEAD_RESTORED','STATUS_CHANGED','COMMENT_ADDED','REFERRAL_MARKED','REFERRAL_UNMARKED','AGENCY_ASSIGNED') group by substr(timestamp,1,10) order by utc_date desc limit 7");
          console.log(JSON.stringify({
            mode: db.mode,
            smtp_configured: Boolean(process.env.SMTP_SERVER && process.env.SENDER_EMAIL && process.env.SENDER_PASSWORD),
            digest_env: {
              enabled: process.env.DAILY_DIGEST_ENABLED ?? "(default true)",
              timezone: process.env.DAILY_DIGEST_TIMEZONE ?? "(default America/Chicago)",
              hour: process.env.DAILY_DIGEST_SEND_HOUR ?? "(default 18)"
            },
            approved_users_with_email: Number(users?.count || 0),
            summary: rows,
            latest,
            activity_utc_dates: activity
          }, null, 2));
          await db.close?.();
          NODE
          REMOTE
